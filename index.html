<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Website Generator</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            color: #333;
            margin: 0;
            padding: 40px 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        }

        h1 {
            text-align: center;
            color: #2c3e50;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-weight: bold;
            margin-bottom: 8px;
            color: #34495e;
        }

        input[type="text"],
        select {
            width: 100%;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 5px;
            box-sizing: border-box;
            font-size: 16px;
        }

        button {
            display: block;
            width: 100%;
            background-color: #3498db;
            color: white;
            border: none;
            padding: 15px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 5px;
            cursor: pointer;
            margin-top: 20px;
        }

        button:hover {
            background-color: #2980b9;
        }

        .output-section {
            margin-top: 40px;
            display: none;
        }

        #outputCode {
            width: 100%;
            height: 250px;
            font-family: monospace;
            background-color: #2d3436;
            color: #00cec9;
            padding: 15px;
            border-radius: 5px;
            box-sizing: border-box;
        }

        #copyBtn {
            background-color: #27ae60;
        }

        #copyBtn:hover {
            background-color: #2ecc71;
        }
    </style>
</head>

<body>

    <div class="container">
        <h1>🚀 Create Your First Website!</h1>
        <p>Fill out the fields below, and we will build your website code for you.</p>

        <!-- THE FORM -->
        <div id="builderForm">
            <div class="form-group">
                <label for="kidName">First Name:</label>
                <input type="text" id="kidName" placeholder="e.g., Priya" required>
            </div>

            <div class="form-group">
                <label for="kidSymbol">Choose your Logo:</label>
                <select id="kidSymbol">
                    <option value="🚀">🚀 Rocket</option>
                    <option value="🌟">🌟 Star</option>
                    <option value="💻">💻 Laptop</option>
                    <option value="⚽">⚽ Soccer Ball</option>
                    <option value="🎨">🎨 Art Palette</option>
                    <option value="📚">📚 Books</option>
                </select>
            </div>

            <div class="form-group">
                <label for="schoolType">Where do you study?</label>
                <select id="schoolType">
                    <option value="a Government School">Government School</option>
                    <option value="a Public School">Public School</option>
                    <option value="a Private School">Private School</option>
                </select>
            </div>

            <div class="form-group">
                <label for="hobby">What is your favorite hobby?</label>
                <input type="text" id="hobby" placeholder="e.g., playing cricket, reading, coding">
            </div>

            <button onclick="generateWebsite()">Generate My Website Code!</button>
        </div>

        <!-- THE OUTPUT AREA -->
        <div class="output-section" id="outputSection">
            <h2>🎉 Your Code is Ready!</h2>
            <p>Click "Copy Code" below, and paste it into your host to see your website live!</p>
            <textarea id="outputCode" readonly></textarea>
            <button id="copyBtn" onclick="copyToClipboard()">📋 Copy Code</button>
        </div>
    </div>

    <script>
        function generateWebsite() {
            // 1. Get the values from the form
            const name = document.getElementById('kidName').value || "Awesome Student";
            const symbol = document.getElementById('kidSymbol').value;
            const school = document.getElementById('schoolType').value;
            const hobby = document.getElementById('hobby').value || "learning new things";

            // 2. Auto-generate the About Me paragraph
            const aboutText = `I am a student studying in ${school}. My favorite thing to do is ${hobby}. This is my first website!`;

            // 3. Create the HTML template
            const templateCode = `<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>${name}'s Website</title>
    <style>
        body { font-family: 'Comic Sans MS', sans-serif; background-color: #e0f7fa; text-align: center; margin: 0; padding: 0; color: #333; }
        header { background-color: #ffcc80; padding: 40px 20px; border-bottom: 4px solid #ffb74d; }
        h1 { font-size: 3em; margin: 0; color: #fff; text-shadow: 2px 2px #ff9800; }
        .symbol { font-size: 4em; margin-top: 10px; }
        .box { max-width: 500px; margin: 30px auto; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); line-height: 1.6; font-size: 1.1em;}
        h2 { color: #00838f; border-bottom: 2px dashed #00838f; padding-bottom: 5px; }
    </style>
</head>
<body>

    <header>
        <h1>Hi, I'm ${name}!</h1>
        <div class="symbol">${symbol}</div>
    </header>

    <div class="box">
        <h2>About Me</h2>
        <p>${aboutText}</p>
    </div>

</body>
</html>`;

            // 4. Put the generated code into the text area
            document.getElementById('outputCode').value = templateCode;

            // 5. Unhide the output section
            document.getElementById('outputSection').style.display = 'block';
        }

        function copyToClipboard() {
            const codeArea = document.getElementById('outputCode');
            codeArea.select();
            codeArea.setSelectionRange(0, 99999);
            navigator.clipboard.writeText(codeArea.value);

            const btn = document.getElementById('copyBtn');
            btn.innerText = "✅ Copied!";
            setTimeout(() => { btn.innerText = "📋 Copy Code"; }, 2000);
        }
    </script>

</body>

</html>
